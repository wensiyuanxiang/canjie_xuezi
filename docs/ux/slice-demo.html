<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>仓颉学字 - 切字 Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a12;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;font-family:'Noto Sans SC',sans-serif;
  overflow:hidden;touch-action:none;user-select:none;
}
.hint{color:#555;font-size:13px;margin-bottom:10px;letter-spacing:1px}
.wrap{
  width:400px;height:720px;position:relative;overflow:hidden;
  border-radius:24px;border:3px solid #333;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
  cursor:crosshair;
}
canvas{display:block;width:100%;height:100%}

.hud{
  position:absolute;top:0;left:0;right:0;
  pointer-events:none;z-index:10;
  padding:14px 16px 0;display:flex;justify-content:space-between;align-items:flex-start;
}
.hud-left{display:flex;flex-direction:column;gap:6px}
.hud-target{
  background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);
  border-radius:10px;padding:6px 12px;display:flex;align-items:center;gap:6px;
}
.hud-target .lbl{font-size:11px;color:rgba(255,255,255,0.5)}
.hud-target .ch{font-size:24px;font-weight:900;color:#FF9F43}
.hud-score{
  background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);
  border-radius:10px;padding:5px 12px;
  font-size:13px;font-weight:700;color:#FFD93D;
}
.hud-timer{
  background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);
  border-radius:16px;padding:5px 14px;
  font-size:14px;font-weight:700;color:#fff;
}
.hud-combo{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:48px;font-weight:900;font-family:'Ma Shan Zheng',serif;
  color:#FFD93D;text-shadow:0 0 30px rgba(255,217,61,0.6);
  opacity:0;transition:opacity 0.15s;pointer-events:none;z-index:10;
}
.hud-combo.show{opacity:1}

.overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:20;transition:opacity 0.4s;
}
.overlay.hidden{opacity:0;pointer-events:none}
.start-bg{background:linear-gradient(180deg,#1a0a1e 0%,#2d1040 40%,#0a0a12 100%)}
.end-bg{background:rgba(10,10,18,0.92);backdrop-filter:blur(8px)}
.start-title{
  font-family:'Ma Shan Zheng',serif;font-size:46px;
  color:#FFD93D;text-shadow:0 4px 24px rgba(255,217,61,0.4);margin-bottom:6px;
}
.start-sub{font-size:13px;color:rgba(255,255,255,0.4);letter-spacing:3px;margin-bottom:36px}
.start-explain{
  font-size:12px;color:rgba(255,255,255,0.35);text-align:center;
  line-height:2;margin-bottom:28px;max-width:280px;
}
.btn{
  background:linear-gradient(135deg,#FF9F43,#e67e22);border:none;
  padding:14px 48px;border-radius:28px;color:#fff;
  font-size:18px;font-weight:700;font-family:'Noto Sans SC',sans-serif;
  cursor:pointer;box-shadow:0 6px 24px rgba(255,159,67,0.4);
  transition:transform 0.15s;pointer-events:all;
}
.btn:hover{transform:scale(1.06)}
.btn:active{transform:scale(0.97)}

.end-emoji{font-size:52px;margin-bottom:6px}
.end-title{font-size:22px;color:#FFD93D;font-weight:700;margin-bottom:4px}
.end-sub{font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:16px}
.end-stats{display:flex;gap:24px;margin-bottom:24px}
.es{text-align:center}
.es-v{font-size:24px;font-weight:900;color:#fff}
.es-l{font-size:10px;color:rgba(255,255,255,0.35)}
</style>
</head>
<body>

<div class="hint">划过目标字切开 | 避开干扰字</div>

<div class="wrap" id="wrap">
  <canvas id="c"></canvas>

  <div class="hud">
    <div class="hud-left">
      <div class="hud-target"><span class="lbl">切</span><span class="ch" id="hudTarget">水</span></div>
      <div class="hud-score" id="hudScore">0 / 6</div>
    </div>
    <div class="hud-timer" id="hudTimer">0:45</div>
  </div>
  <div class="hud-combo" id="comboEl"></div>

  <div class="overlay start-bg" id="startScreen">
    <div class="start-title">仓颉学字</div>
    <div class="start-sub">切字 Demo</div>
    <div class="start-explain">
      字从下方飞出<br>
      用鼠标/手指<b>划过目标字</b>切开<br>
      避开干扰字，切错会断 combo<br>
      45 秒内切够 6 个「水」
    </div>
    <button class="btn" id="btnStart">开始</button>
  </div>

  <div class="overlay end-bg hidden" id="endScreen">
    <div class="end-emoji" id="endEmoji"></div>
    <div class="end-title" id="endTitle"></div>
    <div class="end-sub" id="endSub"></div>
    <div class="end-stats">
      <div class="es"><div class="es-v" id="sCorrect" style="color:#6BCB77">0</div><div class="es-l">切对</div></div>
      <div class="es"><div class="es-v" id="sWrong" style="color:#E17055">0</div><div class="es-l">切错</div></div>
      <div class="es"><div class="es-v" id="sMissed" style="color:#6C8EBF">0</div><div class="es-l">漏掉</div></div>
      <div class="es"><div class="es-v" id="sCombo" style="color:#FFD93D">x0</div><div class="es-l">最高连击</div></div>
    </div>
    <button class="btn" id="btnAgain">再来一次</button>
  </div>
</div>

<script>
const W = 400, H = 720;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const GRAVITY = 750;
const TARGET = '水';
const DISTRACTORS = ['山','出','永','火','木'];
const LEVEL_SEC = 45;
const NEED = 6;

let state = 'start';
let timer = LEVEL_SEC;
let score = 0;
let combo = 0;
let maxCombo = 0;
let stats = {correct:0, wrong:0, missed:0};
let chars = [];
let halves = [];
let slashTrail = [];
let particles = [];
let bigTexts = [];
let spawnAcc = 0;
let lastT = 0;
let swiping = false;
let prevMouse = null;

function reset(){
  chars=[];halves=[];slashTrail=[];particles=[];bigTexts=[];
  timer=LEVEL_SEC;score=0;combo=0;maxCombo=0;
  stats={correct:0,wrong:0,missed:0};
  spawnAcc=0;prevMouse=null;
  document.getElementById('hudScore').textContent='0 / '+NEED;
}

function rng(a,b){return a+Math.random()*(b-a)}

function spawnWave(){
  const count = Math.random()<0.3 ? 1 : (Math.random()<0.5 ? 2 : 3);
  for(let i=0;i<count;i++){
    const isTarget = Math.random() < 0.45;
    const ch = isTarget ? TARGET : DISTRACTORS[Math.floor(Math.random()*DISTRACTORS.length)];
    const x = rng(60, W-60);
    const vx = rng(-80, 80);
    const vy = rng(-620, -480);
    chars.push({
      x, y: H+40,
      vx, vy,
      char: ch,
      isTarget,
      radius: 32,
      rotation: rng(-0.3,0.3),
      rotSpeed: rng(-3,3),
      sliced: false,
      scored: false,
    });
  }
}

function sliceChar(ch, mx, my, mdx, mdy){
  ch.sliced = true;
  if(!ch.scored){
    ch.scored = true;
    if(ch.isTarget){
      stats.correct++;
      score++;
      combo++;
      if(combo>maxCombo) maxCombo=combo;
      document.getElementById('hudScore').textContent = score+' / '+NEED;
      showCombo();
      emitSliceParticles(ch.x, ch.y, '#FF9F43', 12);
      showBigText(ch.x, ch.y, ch.char, '#FF9F43');
    } else {
      stats.wrong++;
      combo=0;
      hideCombo();
      emitSliceParticles(ch.x, ch.y, '#E17055', 8);
      showBigText(ch.x, ch.y, 'X', '#E17055');
    }
  }

  const speed = Math.sqrt(mdx*mdx+mdy*mdy);
  const nx = -mdy / (speed||1);
  const ny = mdx / (speed||1);
  const push = 60;

  halves.push(
    {x:ch.x, y:ch.y, vx:ch.vx+nx*push+rng(-30,30), vy:ch.vy-40+ny*push,
     char:ch.char, isTarget:ch.isTarget, radius:ch.radius,
     rotation:ch.rotation, rotSpeed:ch.rotSpeed-2,
     clipDir:1, alpha:1},
    {x:ch.x, y:ch.y, vx:ch.vx-nx*push+rng(-30,30), vy:ch.vy-40-ny*push,
     char:ch.char, isTarget:ch.isTarget, radius:ch.radius,
     rotation:ch.rotation, rotSpeed:ch.rotSpeed+2,
     clipDir:-1, alpha:1}
  );
}

function emitSliceParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const sp=100+Math.random()*220;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-80,
      life:0.4+Math.random()*0.3,maxLife:0.4+Math.random()*0.3,
      size:3+Math.random()*5,color});
  }
}

function showBigText(x,y,text,color){
  bigTexts.push({x,y,text,color,life:0.6,maxLife:0.6,scale:0.5});
}

function showCombo(){
  const el=document.getElementById('comboEl');
  if(combo>=3){
    el.textContent = combo+'连斩!';
    el.classList.add('show');
    clearTimeout(el._t);
    el._t=setTimeout(()=>el.classList.remove('show'),800);
  }
}
function hideCombo(){
  document.getElementById('comboEl').classList.remove('show');
}

function checkSlice(ax,ay,bx,by){
  for(const ch of chars){
    if(ch.sliced) continue;
    const dx=ch.x-ax, dy=ch.y-ay;
    const ex=bx-ax, ey=by-ay;
    const len2=ex*ex+ey*ey;
    if(len2<1) continue;
    let t=Math.max(0,Math.min(1,(dx*ex+dy*ey)/len2));
    const cx=ax+t*ex, cy=ay+t*ey;
    const dist=Math.sqrt((ch.x-cx)**2+(ch.y-cy)**2);
    if(dist < ch.radius+6){
      sliceChar(ch, (ax+bx)/2, (ay+by)/2, bx-ax, by-ay);
    }
  }
}

function endGame(){
  state='end';
  document.getElementById('sCorrect').textContent=stats.correct;
  document.getElementById('sWrong').textContent=stats.wrong;
  document.getElementById('sMissed').textContent=stats.missed;
  document.getElementById('sCombo').textContent='x'+maxCombo;
  const rate=(stats.correct+stats.missed)>0?stats.correct/(stats.correct+stats.missed):0;
  if(rate>=0.9&&stats.wrong===0){
    document.getElementById('endEmoji').textContent='\u{1F333}';
    document.getElementById('endTitle').textContent='大树';
  } else if(rate>=0.7){
    document.getElementById('endEmoji').textContent='\u{1F33F}';
    document.getElementById('endTitle').textContent='幼苗';
  } else {
    document.getElementById('endEmoji').textContent='\u{1F331}';
    document.getElementById('endTitle').textContent='种子';
  }
  document.getElementById('endSub').textContent=
    '切对 '+stats.correct+' 个「'+TARGET+'」';
  document.getElementById('endScreen').classList.remove('hidden');
}

function update(dt){
  if(state!=='playing') return;
  timer-=dt;
  const m=Math.floor(Math.max(0,timer)/60);
  const s=Math.floor(Math.max(0,timer)%60);
  document.getElementById('hudTimer').textContent=m+':'+String(s).padStart(2,'0');
  if(timer<=0){endGame();return}

  spawnAcc+=dt;
  const interval = 1.0 + Math.random()*0.6;
  if(spawnAcc>=interval){spawnAcc=0;spawnWave()}

  // chars physics
  for(let i=chars.length-1;i>=0;i--){
    const c=chars[i];
    c.vy+=GRAVITY*dt;
    c.x+=c.vx*dt;
    c.y+=c.vy*dt;
    c.rotation+=c.rotSpeed*dt;
    if(c.y>H+60){
      if(c.isTarget&&!c.sliced){stats.missed++;combo=0;hideCombo()}
      chars.splice(i,1);
    }
  }

  // halves
  for(let i=halves.length-1;i>=0;i--){
    const h=halves[i];
    h.vy+=GRAVITY*dt;
    h.x+=h.vx*dt;
    h.y+=h.vy*dt;
    h.rotation+=h.rotSpeed*dt;
    h.alpha-=dt*1.2;
    if(h.alpha<=0||h.y>H+80) halves.splice(i,1);
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue}
    p.vy+=400*dt;
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
  }

  // big texts
  for(let i=bigTexts.length-1;i>=0;i--){
    const t=bigTexts[i];
    t.life-=dt;
    t.y-=80*dt;
    t.scale+= 3*dt;
    if(t.life<=0) bigTexts.splice(i,1);
  }

  // slash trail fade
  for(let i=slashTrail.length-1;i>=0;i--){
    slashTrail[i].life-=dt;
    if(slashTrail[i].life<=0) slashTrail.splice(i,1);
  }
}

function draw(){
  // BG
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#12101a');
  bg.addColorStop(0.6,'#1a1520');
  bg.addColorStop(1,'#0e0c14');
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  // subtle radial glow at bottom
  const glow=ctx.createRadialGradient(W/2,H,0,W/2,H,300);
  glow.addColorStop(0,'rgba(255,159,67,0.06)');
  glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;
  ctx.fillRect(0,H-300,W,300);

  // slash trail
  if(slashTrail.length>=2){
    ctx.lineCap='round';
    ctx.lineJoin='round';
    for(let i=1;i<slashTrail.length;i++){
      const a=slashTrail[i-1], b=slashTrail[i];
      const alpha=b.life/b.maxLife;
      ctx.strokeStyle=`rgba(255,255,255,${alpha*0.7})`;
      ctx.lineWidth=3+alpha*4;
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);
      ctx.lineTo(b.x,b.y);
      ctx.stroke();
      // inner glow
      ctx.strokeStyle=`rgba(255,217,61,${alpha*0.5})`;
      ctx.lineWidth=1+alpha*2;
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);
      ctx.lineTo(b.x,b.y);
      ctx.stroke();
    }
  }

  // chars
  for(const ch of chars){
    if(ch.sliced) continue;
    ctx.save();
    ctx.translate(ch.x,ch.y);
    ctx.rotate(ch.rotation);

    // outer glow
    const r = ch.radius;
    const grad=ctx.createRadialGradient(0,0,r*0.3,0,0,r*1.3);
    if(ch.isTarget){
      grad.addColorStop(0,'rgba(255,159,67,0.25)');
      grad.addColorStop(1,'rgba(255,159,67,0)');
    } else {
      grad.addColorStop(0,'rgba(108,142,191,0.15)');
      grad.addColorStop(1,'rgba(108,142,191,0)');
    }
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(0,0,r*1.3,0,Math.PI*2);
    ctx.fill();

    // circle
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle=ch.isTarget?'rgba(255,159,67,0.2)':'rgba(108,142,191,0.12)';
    ctx.fill();
    ctx.strokeStyle=ch.isTarget?'rgba(255,159,67,0.5)':'rgba(108,142,191,0.3)';
    ctx.lineWidth=2.5;
    ctx.stroke();

    // char
    ctx.fillStyle=ch.isTarget?'#fff':'rgba(255,255,255,0.55)';
    ctx.font='900 28px "Noto Sans SC"';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(ch.char,0,1);

    ctx.restore();
  }

  // halves (sliced pieces)
  for(const h of halves){
    ctx.save();
    ctx.globalAlpha=Math.max(0,h.alpha);
    ctx.translate(h.x,h.y);
    ctx.rotate(h.rotation);

    ctx.beginPath();
    if(h.clipDir>0){
      ctx.rect(-h.radius,-h.radius,h.radius,h.radius*2);
    } else {
      ctx.rect(0,-h.radius,h.radius,h.radius*2);
    }
    ctx.clip();

    ctx.beginPath();
    ctx.arc(0,0,h.radius,0,Math.PI*2);
    ctx.fillStyle=h.isTarget?'rgba(255,159,67,0.18)':'rgba(108,142,191,0.1)';
    ctx.fill();
    ctx.strokeStyle=h.isTarget?'rgba(255,159,67,0.4)':'rgba(108,142,191,0.25)';
    ctx.lineWidth=2;
    ctx.stroke();

    ctx.fillStyle=h.isTarget?'rgba(255,255,255,0.8)':'rgba(255,255,255,0.4)';
    ctx.font='900 28px "Noto Sans SC"';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(h.char,0,1);

    ctx.restore();
  }

  // particles
  for(const p of particles){
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;

  // big texts
  for(const t of bigTexts){
    const a=t.life/t.maxLife;
    ctx.save();
    ctx.globalAlpha=a;
    ctx.translate(t.x,t.y);
    ctx.scale(t.scale,t.scale);
    ctx.fillStyle=t.color;
    ctx.font='900 36px "Ma Shan Zheng"';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.shadowColor=t.color;
    ctx.shadowBlur=20;
    ctx.fillText(t.text,0,0);
    ctx.restore();
  }
}

function loop(ts){
  const dt=Math.min((ts-lastT)/1000,0.05);
  lastT=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// Input
const wrap=document.getElementById('wrap');

function getXY(e){
  const r=wrap.getBoundingClientRect();
  const sx=W/r.width, sy=H/r.height;
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return {x:(cx-r.left)*sx, y:(cy-r.top)*sy};
}

wrap.addEventListener('mousedown',e=>{
  if(state!=='playing') return;
  swiping=true;
  const p=getXY(e);
  prevMouse=p;
  slashTrail=[{x:p.x,y:p.y,life:0.15,maxLife:0.15}];
});
wrap.addEventListener('mousemove',e=>{
  if(!swiping||state!=='playing') return;
  const p=getXY(e);
  if(prevMouse){
    checkSlice(prevMouse.x,prevMouse.y,p.x,p.y);
    slashTrail.push({x:p.x,y:p.y,life:0.15,maxLife:0.15});
    if(slashTrail.length>30) slashTrail.shift();
  }
  prevMouse=p;
});
wrap.addEventListener('mouseup',()=>{swiping=false;prevMouse=null});
wrap.addEventListener('mouseleave',()=>{swiping=false;prevMouse=null});

wrap.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(state!=='playing') return;
  swiping=true;
  const p=getXY(e);
  prevMouse=p;
  slashTrail=[{x:p.x,y:p.y,life:0.15,maxLife:0.15}];
},{passive:false});
wrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!swiping||state!=='playing') return;
  const p=getXY(e);
  if(prevMouse){
    checkSlice(prevMouse.x,prevMouse.y,p.x,p.y);
    slashTrail.push({x:p.x,y:p.y,life:0.15,maxLife:0.15});
    if(slashTrail.length>30) slashTrail.shift();
  }
  prevMouse=p;
},{passive:false});
wrap.addEventListener('touchend',e=>{e.preventDefault();swiping=false;prevMouse=null},{passive:false});

document.getElementById('btnStart').addEventListener('click',()=>{
  state='playing';reset();
  document.getElementById('startScreen').classList.add('hidden');
});
document.getElementById('btnAgain').addEventListener('click',()=>{
  state='playing';reset();
  document.getElementById('endScreen').classList.add('hidden');
});

requestAnimationFrame(ts=>{lastT=ts;loop(ts)});
</script>
</body>
</html>
