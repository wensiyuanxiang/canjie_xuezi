name: zaozi
description: 仓颉切字 MVP（Flutter + Flame），竖屏优先。
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  flame: ^1.22.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/bg/
    - assets/images/character/
    - assets/images/game/
    - assets/images/particle/
    - assets/images/ui/
    - assets/images/rank/
    - assets/audio/bgm/
    - assets/audio/sfx/
    - assets/fonts/
